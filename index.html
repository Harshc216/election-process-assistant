<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Election Process Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">
  <h2 class="text-center mb-4">🗳️ Election Process Education Assistant</h2>

  <div class="card mb-4">
    <div class="card-body">
      <h4>Election Process Steps</h4>
      <ul>
        <li>1. Voter Registration</li>
        <li>2. Candidate Nomination</li>
        <li>3. Campaigning</li>
        <li>4. Voting Day</li>
        <li>5. Counting & Results</li>
      </ul>
    </div>
  </div>

  <div class="card mb-4">
    <div class="card-body">
      <h4>Election Timeline</h4>
      <p>Registration → Nomination → Campaign → Voting → Counting</p>
    </div>
  </div>

  <div class="card">
    <div class="card-body">
      <h4>Ask Questions</h4>
      <input type="text" id="userInput" class="form-control mb-2" placeholder="Ask something...">
      <button onclick="getAnswer()" class="btn btn-primary">Ask</button>

      <div id="chatBox" class="mt-3"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
